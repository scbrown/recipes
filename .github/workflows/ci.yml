name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Lint, type-check, validate, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (eslint, stylelint, markdownlint, prettier)
        run: pnpm lint

      - name: Spell-check (cspell)
        run: pnpm lint:prose

      - name: Cross-file validation
        run: pnpm validate

      - name: Type-check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build

      - name: Package hygiene (knip)
        run: pnpm hygiene
        continue-on-error: true

  prose-lint:
    name: Vale prose lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: errata-ai/vale-action@reviewdog
        with:
          files: src/content/recipes/ docs/
          fail_on_error: true
          reporter: github-pr-review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
