StylesPath = .vale/styles
MinAlertLevel = warning

Packages = write-good, proselint

Vocab = Recipes

[*.md]
BasedOnStyles = Vale, write-good, proselint, Recipes

# write-good rules tuned for recipe voice
write-good.E-Prime = NO
write-good.Passive = warning
write-good.TooWordy = NO
write-good.Weasel = warning

# Recipes voice — keep imperative steps tight
Recipes.NoFiller = error
Recipes.UnitsConsistent = error
Recipes.TempFormat = error
Recipes.NoJumpToRecipe = error
